    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Del Cerebro a la Mente | WebGL Experience</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffff; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 0.2em;
            z-index: 10; pointer-events: none; text-align: center;
            text-shadow: 0 0 10px #00ffff;
        }
        .hud {
            position: absolute; bottom: 20px; left: 20px; color: rgba(255, 255, 255, 0.5);
            font-size: 12px; z-index: 5; pointer-events: none;
        }
    </style>
    <!-- MediaPipe Hands & Camera Utils -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading">Inicializando Neural Link...<br><span style="font-size:0.8em; opacity:0.7">Permite el acceso a la cámara</span></div>
    <div id="webcam-container" style="position:absolute;top:0;left:0;width:100vw;height:100vh;z-index:2;opacity:0.85;pointer-events:none;">
        <video id="webcam-video" autoplay playsinline style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);opacity:0;"></video>
        <canvas id="webcam-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1);"></canvas>
    </div>
    <div class="hud">SYSTEM: BRAIN_HOLO // MANO: ROTAR · PINCH: ZOOM</div>

    <!-- Three.js & PostProcessing via Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- CONFIGURACIÓN ESCENA ---
        const scene = new THREE.Scene();
        // Niebla negra profunda para profundidad
        scene.fog = new THREE.FogExp2(0x000000, 0.03);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 4.5;

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- POST-PROCESADO (BLOOM) ---
        const renderScene = new RenderPass(scene, camera);
        
        // Bloom estilo Cyberpunk: Alto umbral, radio medio, intensidad alta
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0;
        bloomPass.strength = 2.5; // Brillo intenso
        bloomPass.radius = 0.5;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- CEREBRO HOLOGRÁFICO PROCEDURAL (forma anatómica reconocible) ---
        const colorCyan = 0x00f3ff;   // Arterias / wireframe
        const colorPurple = 0x8800ff; // Masa cerebral

        function createBrainHemisphere(isLeft) {
            const radius = 0.5;
            const seg = 42;
            const thetaStart = isLeft ? Math.PI : 0;
            const geo = new THREE.SphereGeometry(radius, seg, seg, 0, Math.PI, thetaStart, Math.PI);
            geo.scale(1.0, 1.18, 0.88);
            const pos = geo.attributes.position;
            const normals = geo.attributes.normal;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
                const nx = normals.getX(i), ny = normals.getY(i), nz = normals.getZ(i);
                const u = Math.atan2(z, x) / (2 * Math.PI) + 0.5;
                const v = Math.asin(Math.max(-1, Math.min(1, y / (radius * 1.18)))) / Math.PI + 0.5;
                const gyrus = Math.sin(u * 22) * 0.08 + Math.cos(v * 16) * 0.07
                    + Math.sin((u * 2 + v) * 10) * 0.05 + Math.cos((u - v * 1.5) * 14) * 0.04;
                const midline = isLeft ? Math.max(0, x) : Math.min(0, x);
                const groove = midline * midline * 0.15;
                pos.setXYZ(i, x + nx * (gyrus - groove), y + ny * gyrus, z + nz * gyrus);
            }
            geo.deleteAttribute('normal');
            geo.computeVertexNormals();
            const side = isLeft ? -1 : 1;
            geo.translate(side * 0.22, 0.06, 0);
            return geo;
        }

        function addBrainPart(geo, group, wireframeOnly = false) {
            const fillMat = new THREE.MeshBasicMaterial({
                color: colorPurple,
                transparent: true,
                opacity: 0.22,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            const wireMat = new THREE.MeshBasicMaterial({
                color: colorCyan,
                wireframe: true,
                transparent: true,
                opacity: 0.85,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            if (!wireframeOnly) {
                group.add(new THREE.Mesh(geo.clone(), fillMat));
            }
            group.add(new THREE.Mesh(geo.clone(), wireMat));
            const pointsGeo = new THREE.BufferGeometry();
            pointsGeo.setAttribute('position', geo.attributes.position.clone());
            group.add(new THREE.Points(pointsGeo, new THREE.PointsMaterial({
                color: colorCyan,
                size: 0.012,
                transparent: true,
                opacity: 0.75,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            })));
        }

        const brainGroup = new THREE.Group();

        const leftHemisphereGeo = createBrainHemisphere(true);
        const rightHemisphereGeo = createBrainHemisphere(false);
        addBrainPart(leftHemisphereGeo, brainGroup);
        addBrainPart(rightHemisphereGeo, brainGroup);

        const stemGeo = new THREE.CylinderGeometry(0.035, 0.08, 0.42, 12);
        stemGeo.translate(0, -0.38, 0.02);
        addBrainPart(stemGeo, brainGroup);

        const cerebellumGeo = new THREE.SphereGeometry(0.2, 28, 20, 0, Math.PI * 2, 0, Math.PI * 0.7);
        cerebellumGeo.scale(1.4, 0.5, 1.0);
        const posC = cerebellumGeo.attributes.position;
        for (let i = 0; i < posC.count; i++) {
            const x = posC.getX(i), y = posC.getY(i), z = posC.getZ(i);
            const n = new THREE.Vector3(x, y, z).normalize();
            const stripes = Math.sin(z * 25) * 0.035 + Math.sin(x * 18) * 0.02;
            posC.setXYZ(i, x + n.x * stripes, y + n.y * stripes, z + n.z * stripes);
        }
        cerebellumGeo.deleteAttribute('normal');
        cerebellumGeo.computeVertexNormals();
        cerebellumGeo.translate(0, -0.12, -0.38);
        addBrainPart(cerebellumGeo, brainGroup);

        scene.add(brainGroup);

        // --- CONTROL CONTINUO POR MANO (MediaPipe + visualización holográfica) ---
        let targetRotationX = 0;
        let targetRotationY = 0;
        let targetScale = 1.0;

        const videoElement = document.getElementById('webcam-video');
        const canvasElement = document.getElementById('webcam-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingElement = document.getElementById('loading');

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            loadingElement.style.display = 'none';
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
                    color: 'rgba(0, 243, 255, 0.4)', lineWidth: 2
                });
                drawLandmarks(canvasCtx, landmarks, {
                    color: '#00f3ff', lineWidth: 1, radius: 2
                });

                const handCenterX = landmarks[9].x;
                const handCenterY = landmarks[9].y;
                targetRotationY = (handCenterX - 0.5) * Math.PI * 4;
                targetRotationX = (handCenterY - 0.5) * Math.PI * 2;

                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];
                const distance = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                targetScale = Math.max(0.3, Math.min(6.0, distance * 15));
            }
            canvasCtx.restore();
        });

        try {
            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => {
                    if (canvasElement.width !== videoElement.clientWidth) {
                        canvasElement.width = videoElement.clientWidth;
                        canvasElement.height = videoElement.clientHeight;
                    }
                    await hands.send({ image: videoElement });
                },
                width: 1280,
                height: 720
            });
            cameraUtils.start();
        } catch (e) {
            console.error("Error iniciando cámara:", e);
            loadingElement.innerHTML = "ERROR: CÁMARA NO DETECTADA<br>Recarga y asegura permisos";
            loadingElement.style.color = "#ff0000";
        }

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const lerp = 0.1;

            brainGroup.rotation.y += (targetRotationY - brainGroup.rotation.y) * lerp;
            brainGroup.rotation.x += (targetRotationX - brainGroup.rotation.x) * lerp;
            const s = brainGroup.scale.x + (targetScale - brainGroup.scale.x) * lerp;
            brainGroup.scale.setScalar(s);

            composer.render();
        }

        // --- RESIZE HANDLER ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            bloomPass.resolution.set(window.innerWidth, window.innerHeight);
        });

        animate();

    </script>
</body>
</html>
